<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopWhoa - Magical 3D Pop-Up Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #E8B4B8;
            --primary-dark: #D4959A;
            --secondary: #A8D8EA;
            --accent: #F7DC6F;
            --soft-pink: #FADBD8;
            --soft-lavender: #E8DAEF;
            --soft-mint: #D5F4E6;
            --soft-peach: #FDEBD0;
            --cream: #FDF6E3;
            --text-dark: #2C3E50;
            --text-light: #5D6D7E;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background: var(--cream); }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
        
        /* Announcement */
        .announcement { background: linear-gradient(90deg, var(--primary), var(--soft-pink)); padding: 12px; text-align: center; font-size: 0.85rem; font-weight: 500; }
        
        /* Header */
        header { background: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
        .header-main { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; max-width: 1400px; margin: 0 auto; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--primary-dark); text-decoration: none; font-weight: 600; }
        .header-actions { display: flex; gap: 25px; align-items: center; }
        .header-actions a { color: var(--text-dark); text-decoration: none; font-size: 0.9rem; }
        
        /* Navigation */
        nav { background: #fff; border-top: 1px solid #f0f0f0; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: center; gap: 40px; padding: 0 5%; }
        .nav-item { position: relative; padding: 18px 0; }
        .nav-item > a { color: var(--text-dark); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .dropdown { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: #fff; min-width: 260px; padding: 20px; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 100; }
        .nav-item:hover .dropdown { opacity: 1; visibility: visible; }
        .dropdown h4 { color: var(--primary-dark); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 12px; }
        .dropdown a { display: block; color: var(--text-light); text-decoration: none; padding: 8px 0; font-size: 0.9rem; }
        .dropdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Hero */
        .hero { min-height: 85vh; display: flex; align-items: center; background: linear-gradient(135deg, var(--soft-pink) 0%, var(--soft-lavender) 50%, var(--soft-mint) 100%); position: relative; overflow: hidden; }
        .hero-content { max-width: 1400px; margin: 0 auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .hero-text h1 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-text p { font-size: 1.1rem; color: var(--text-light); line-height: 1.7; margin-bottom: 30px; }
        .btn-primary { background: var(--primary-dark); color: white; padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-block; }
        .btn-secondary { background: transparent; color: var(--text-dark); padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; border: 2px solid var(--text-dark); margin-left: 15px; }
        
        /* Features */
        .features { padding: 80px 5%; background: #fff; }
        .features-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
        .feature-item { text-align: center; padding: 30px; }
        .feature-icon { width: 70px; height: 70px; background: var(--soft-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.8rem; color: var(--primary-dark); }
        
        /* Products */
        .products { padding: 100px 5%; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.5rem; margin-bottom: 15px; }
        .products-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
        .product-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.08); transition: all 0.4s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .product-image { height: 280px; position: relative; overflow: hidden; }
        .product-image-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; }
        .product-badge { position: absolute; top: 15px; left: 15px; background: var(--primary-dark); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .product-info { padding: 25px; }
        .product-category { color: var(--primary-dark); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .product-name { font-size: 1.1rem; margin-bottom: 10px; }
        .product-price { font-size: 1.2rem; font-weight: 600; }
        
        /* Categories */
        .categories { padding: 100px 5%; background: #fff; }
        .categories-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .category-card { position: relative; height: 300px; border-radius: 20px; overflow: hidden; cursor: pointer; }
        .category-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 6rem; }
        .category-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); }
        .category-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; color: white; }
        .category-content h3 { font-size: 1.5rem; margin-bottom: 8px; }
        
        /* Custom Section */
        .custom-section { padding: 120px 5%; background: linear-gradient(135deg, var(--soft-lavender), var(--soft-pink)); }
        .custom-content { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
        .custom-text h2 { font-size: 2.8rem; margin-bottom: 25px; }
        .custom-text p { font-size: 1.1rem; color: var(--text-light); line-height: 1.8; margin-bottom: 30px; }
        
        /* Footer */
        footer { background: #1a1a2e; color: white; padding: 80px 5% 40px; }
        .footer-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 60px; margin-bottom: 60px; }
        .footer-column h4 { font-size: 1.1rem; margin-bottom: 25px; }
        .footer-column ul { list-style: none; }
        .footer-column li { margin-bottom: 12px; }
        .footer-column a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; }

            .hero-content { grid-template-columns: 1fr; text-align: center; }
            .features-grid { grid-template-columns: repeat(2, 1fr); }
            .products-grid { grid-template-columns: repeat(2, 1fr); }
